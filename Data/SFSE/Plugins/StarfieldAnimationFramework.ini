; SAF stable profile for Starfield 1.16.244
; The RVA overrides below are DISABLED (=0) on purpose. With 0, SAF resolves
; every hook through the SFSE Address Library (versionlib-1-16-244-0.bin) by
; function ID -- correct for whatever exe is installed, and it auto-adjusts if
; you update the game (no manual re-derivation needed).
;
; History: hand-entered RVAs here were the CTD-on-load cause. They pointed at
; the WRONG functions -- e.g. GraphUpdateHookRVA=0x38CA40 was an unrelated
; function (id 38931), not the graph-update function (id 73213) -- so the
; animation detour overwrote live code and crashed the moment a graph updated
; (menu background actors). Verified id -> 244 offset via the Address Library:
;   GraphUpdateHook  id 73213  -> 0xF08630
;   ModelDBDecRef    id 36741  -> 0x2F8000
;   AnimGraphMgrCall id 118488 -> 0x2083640
;   SaveLoadListener id 481117 -> 0x4DA3940
; Leave these at 0 unless the Address Library genuinely lacks an ID for your
; version (in which case supply the exact RVA from IDA, not a guessed one).

; ---- Hooks ----
EnableMenuHook=0
EnableCameraHook=0
EnableInputHook=0
EnableAnimationHooks=1
EnableVtableHooks=0
EnablePlayerUpdateEvent=0
EnableTaskUpdateLoop=1
TaskUpdateLoopAssumeMainThread=1
TaskUpdateLoopAllowUpdateGraphs=1
TaskDuplicateUpdateWithHook=0
TaskUpdateLoopAllowDump=0
; 1 = szczegółowe logi [FRAMEDUMP] w UpdateGraphs (kosztowne przy wielu aktorach)
UpdateGraphsVerboseFrameDump=0

; ---- RVAs / IDs ----  (all overrides 0 => resolve via Address Library by ID)
GraphUpdateHookRVA=0
BSAnimationGraphUpdateRVA=0
AnimGraphManagerCallRVA=0
InitLoadEventRVA=0
ModelDBDecRefRVA=0
PlayerUpdateEventRVA=0
UpdateSceneRectEventRVA=0
SaveLoadListenerID=481117
SaveLoadListenerRVA=0

; ---- Animation apply mode ----
; UseNAFApplyMode=1: pełna 4x4 z klipu (jak NAF). Physics z INI — w NAF zwykle tylko rotacja;
; pełna 4x4 przy Physics+NAF: łańcuch C_Penis_* (translacja z klipu).
; Wagina/labia/łechtaczka są pomijane w SAF (100% kontrola gry/SOS).
UseNAFApplyMode=1
NAFForceUnitScale=1
NormalizeKeyframesQuaternions=1
ApplyYUpToZUpConversion=1
ApplyOnlyToAnimatedJoints=0
UseModelDBForRestPose=0
FreezeBonesWithoutClipChannel=1

; ---- Optional tuning ----
PhysicsJoints=Penis,Balls,Genitals,Vagina,Labia,Clitoris,Anus,C_Belly
AnimateFaceJoints=1
FaceAnimationStrength=1.0
PlaySceneSpeed=1.0

; ---- Skeleton fallback ----
; Default skeleton to use for races without their own skeleton file (e.g., HumanRace).
; This allows other races to play animations designed for HumanRace without needing separate skeleton files.
DefaultSkeleton=HumanRace
